openapi: 3.0.1
info:
  title: AdoptMe API - Users
  version: 1.0.0

tags:
  - name: Users
    description: Endpoints de gestión de usuarios

paths:
  /users:
    get:
      summary: Listar todos los usuarios
      tags: [Users]
      responses:
        "200":
          description: Lista de usuarios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'

  /users/{uid}:
    get:
      summary: Obtener usuario por ID
      tags: [Users]
      parameters:
        - in: path
          name: uid
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Usuario encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        "404": { description: Usuario no encontrado }

    put:
      summary: Actualizar usuario por ID
      tags: [Users]
      parameters:
        - in: path
          name: uid
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
      responses:
        "200": { description: Usuario actualizado }

    delete:
      summary: Eliminar usuario por ID
      tags: [Users]
      parameters:
        - in: path
          name: uid
          required: true
          schema: { type: string }
      responses:
        "200": { description: Usuario eliminado }

components:
  schemas:
    User:
      type: object
      properties:
        _id: { type: string, description: ID generado por MongoDB }
        first_name: { type: string, description: Nombre }
        last_name: { type: string, description: Apellido }
        email: { type: string, description: Correo electrónico único }
        password: { type: string, description: Contraseña encriptada }
      example:
        _id: "641f1a2b3c4d5e6f7g8h9i0j"
        first_name: "Juan"
        last_name: "Pérez"
        email: "juan.perez@example.com"
        password: "$2b$10$hashEncriptado"