openapi: 3.0.1
info:
  title: AdoptMe API - Sessions
  version: 1.0.0

tags:
  - name: Sessions
    description: Endpoints de autenticación y sesiones

paths:
  /sessions/register:
    post:
      summary: Registrar un nuevo usuario
      tags: [Sessions]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterRequest' }
      responses:
        "200": { description: Usuario registrado }

  /sessions/login:
    post:
      summary: Iniciar sesión protegido con JWT
      tags: [Sessions]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        "200": { description: Login exitoso }

  /sessions/current:
    get:
      summary: Obtener usuario actual desde cookie protegida
      tags: [Sessions]
      responses:
        "200": { description: Usuario actual }

components:
  schemas:
    RegisterRequest:
      type: object
      properties:
        first_name: { type: string, description: Nombre }
        last_name: { type: string, description: Apellido }
        email: { type: string, description: Correo electrónico único }
        password: { type: string, description: Contraseña }
      example:
        first_name: "María"
        last_name: "Gómez"
        email: "maria.gomez@example.com"
        password: "123456"

    LoginRequest:
      type: object
      properties:
        email: { type: string, description: Correo electrónico }
        password: { type: string, description: Contraseña }
      example:
        email: "juan.perez@example.com"
        password: "123456"
